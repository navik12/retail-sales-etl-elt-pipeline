name: CI

# Run this workflow on every push and every pull request.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest   # GitHub gives us a fresh Linux machine

    steps:
      # 1. Get a copy of the repo's code onto the machine
      - name: Check out the code
        uses: actions/checkout@v4

      # 2. Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install our project's dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the tests. If any test fails, the whole workflow fails (red X).
      - name: Run tests
        run: pytest -v
